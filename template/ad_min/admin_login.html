<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
	<base href="/static/ad_min/admin_login/">
	<!-- Meta tags -->
	<title>admin_login</title>
	<meta name="keywords" content="Winter Login Form Responsive widget, Flat Web Templates, Android Compatible web template,
	Smartphone Compatible web template, free webdesigns for Nokia, Samsung, LG, SonyEricsson, Motorola web design" />
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- stylesheets -->
	<link rel="stylesheet" href="css/font-awesome.css">
	<link rel="stylesheet" href="css/style.css">
	<!-- google fonts  -->
	<link href="//fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
	<link href="//fonts.googleapis.com/css?family=Raleway:400,500,600,700" rel="stylesheet">
	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

  <script>
    {% for msg in messages %}
        alert('{{ msg }}')
    {% endfor %}
  </script>

	<div class="agile-login">
		<h1>ADMIN LOGIN</h1>
		<div class="wrapper">
			<div class="w3ls-form">
				<form action="/adminlogin/" method="post">
					{% csrf_token %}
					<label>E-mail</label>
					<input type="text" name="email" placeholder="E-mail" autocomplete="off" required/>
					<label>Password</label>
					<div class="password-wrapper">
						<input type="password" id="password" name="password" placeholder="Password" required />
						<span id="toggle-password" class="fa fa-eye"></span>
					</div>
					<br>
					<input type="submit" value="LOG IN" />
					<button type="button" onclick="location.href = '/'">BACK</button>
				</form>
			</div>
		</div>
		<br>
	</div>

	<script>
		document.getElementById('toggle-password').addEventListener('click', function () {
			const passwordField = document.getElementById('password');
			const icon = this;

			if (passwordField.type === 'password') {
				passwordField.type = 'text';
				icon.classList.remove('fa-eye');
				icon.classList.add('fa-eye-slash');
			} else {
				passwordField.type = 'password';
				icon.classList.remove('fa-eye-slash');
				icon.classList.add('fa-eye');
			}
		});
	</script>

</body>
</html>
