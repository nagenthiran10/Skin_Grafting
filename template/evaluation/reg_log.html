	<h1 style = "color:black;">EVALUATION REGISTER & LOGIN FORM</h1>

	<div class="container w3layouts agileits">

		<div class="login w3layouts agileits">
			<h2>LOGIN</h2>
			<form action="/eval_login/" method="post">
				{% csrf_token %}
				<input type="text" name="email" placeholder="E-mail" autocomplete="off" required="">
				<input type="password" id="password" name="password" placeholder="Password" required="">
				<div class="LR-button" >
					<input type="submit" value="Log In">
				</div>
			</form>
			<br>
			<ul class="tick w3layouts agileits">
				<li>
					<input type="checkbox" id="brand1" onclick="togglePassword()">
					<label for="brand1"><span></span>Show Password</label>
				</li>
			</ul>
<!--			<div class="send-button w3layouts agileits">-->
<!--				<form  action="/exfo_login/">-->
<!--					<input type="submit" value="Log In">-->
<!--				</form>-->
<!--			</div>-->

			<div class="login-link">
                <p style="color:white;"><span>Don't have an account? <a href="/eval_register/">Register</a></span></p>
            </div>

			<div class="clear"></div>
		</div>




		<div class="register w3layouts agileits">
			<h2>REGISTER</h2>
			<form action="/eval_register/" method="post">
				{% csrf_token %}
				<input type="text" name="name" placeholder="Name" autocomplete="off" required="">
				<input type="text" name="email" placeholder="Email" autocomplete="off" required="">
				<input name="phone" id="phone" type="text" value="" autocomplete="off" placeholder="Contact Number"  required pattern="[6-9]{1}[0-9]{9}"
                               title="Phone number must be 10 digits long and start with a number from 6 to 9">
				<input type="text" name="department" placeholder="Department" autocomplete="off" value="Evaluation" readonly required="">
				<div class="LR-button" >
					<input type="submit" value="Register">
				</div>
			</form>
<!--			<div class="send-button w3layouts agileits">-->
<!--				<form action="/exfo_register/">-->
<!--					<input type="submit" value="Register" >-->
<!--				</form>-->
<!--			</div>-->

                <p><span>Already have an account? <a href="/eval_login/">Login</a></span></p>
            </div>

			<div class="clear"></div>
		</div>

		<div class="clear"></div>

            </form>
        </div>

<script type="text/javascript">
		function togglePassword() {
			var passwordField = document.getElementById("password");
			if (passwordField.type === "password") {
				passwordField.type = "text";
			} else {
				passwordField.type = "password";
			}
		}
</script>

    <script>
document.getElementById('phone').addEventListener('input', function (e) {
    var phone = e.target.value;
    var pattern = /^[6-9][0-9]{9}$/;

    if (!pattern.test(phone)) {
        e.target.setCustomValidity("Please enter a valid phone number.");
    } else {
        e.target.setCustomValidity("");
    }
});

document.getElementById('phone').addEventListener('invalid', function (e) {
    if (e.target.validity.patternMismatch) {
        e.target.setCustomValidity("Please enter a valid phone number.");
    }
});
</script>




</body>
